services:
  llm:
    image: qwen3vl-llama-runtime:rocm
    build:
      context: .
      dockerfile: Dockerfile.llama-runtime
    container_name: qwen3vl-llm
    restart: unless-stopped

    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri

    group_add:
      - video

    environment:
      - HSA_OVERRIDE_GFX_VERSION=11.5.1

    volumes:
      - ${LLAMA_ROCM_DIR:?set LLAMA_ROCM_DIR in .env}:/opt/llama:ro
      - ${MODELS_DIR:-./models}:/models:ro
      - llama-cache:/cache

    ports:
      - "${LLM_HOST_PORT:-8082}:8080"

    healthcheck:
      test:
        - CMD-SHELL
        - "bash -lc ': >/dev/tcp/127.0.0.1/8080'"
      interval: 30s
      timeout: 5s
      retries: 30
      start_period: 5m

    command:
      - /opt/llama/llama-server
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -m
      - /models/${LLAMA_MODEL_FILE}
      - --mmproj
      - /models/${LLAMA_MMPROJ_FILE}
      - --alias
      - llm
      - --ctx-size
      - "${LLAMA_CTX_SIZE:-8192}"
      - --n-gpu-layers
      - "${LLAMA_N_GPU_LAYERS:-99}"
      - --threads
      - "${LLAMA_THREADS:-8}"
      - --parallel
      - "${LLAMA_PARALLEL:-1}"
      - --flash-attn
      - "on"
      - --cache-type-k
      - q8_0
      - --cache-type-v
      - q8_0
      - --image-min-tokens
      - "1024"

  navigation_pipeline:
    image: vlm-navigation-pipeline:0.1.0
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: vlm-navigation-pipeline
    restart: "no"

    env_file:
      - .env

    environment:
      - MODEL_BACKEND=llama_cpp_server
      - LLAMA_SERVER_URL=http://llm:8080/v1
      - LLAMA_MODEL_ID=llm

    ports:
      - "8001:8000"

    volumes:
      - ./images:/app/images:ro
      - ./live_frames:/app/live_frames
      - ./navigation_outputs:/app/navigation_outputs

    depends_on:
      llm:
        condition: service_healthy

    command:
      - uvicorn
      - pipeline_api:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"

volumes:
  llama-cache:
